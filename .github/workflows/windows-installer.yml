name: windows-installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app (PyInstaller)
        run: |
          pyinstaller --noconfirm --windowed --name OptimalSamplesSelection --collect-all PyQt5 --collect-all ortools main.py

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer (Inno Setup)
        run: |
          iscc.exe packaging\\windows\\installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OptimalSamplesSelectionSetup
          path: dist-installer\\OptimalSamplesSelectionSetup.exe
